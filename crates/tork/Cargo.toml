[package]
name = "tork"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "A FastAPI-style backend web framework for Rust, built on Hyper and Tokio. Annotation-based routers, dependency injection, and OpenAPI out of the box."

[dependencies]
tork-core.workspace = true
tork-macros.workspace = true
tork-openapi = { workspace = true, optional = true }

# Re-exported (as __serde / __garde / __schemars) so that code generated by
# #[api_model] compiles in user crates that depend only on `tork`.
serde.workspace = true
serde_json.workspace = true
garde.workspace = true
schemars.workspace = true

[features]
default = ["openapi"]
# Enables OpenAPI specification generation and the embedded documentation UI.
openapi = ["dep:tork-openapi"]
# Exports traces over OTLP via OpenTelemetry.
otel = ["tork-core/otel"]

[dev-dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }
flate2 = { workspace = true }
futures-util = { workspace = true }
tokio-tungstenite = { workspace = true, features = ["connect"] }
garde = { workspace = true }
